<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ $title := .Site.Title }}
    <title>{{ if .IsPage }}{{ .Title }} | {{ $title }}{{ else }}{{ $title }}{{ end }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .img-blend { object-fit: cover; transition: transform 0.5s ease; }
        .bg-indigo-glow { background: radial-gradient(circle at top right, #e0e7ff, transparent); }
        .deck-container { position: relative; width: 240px; height: 320px; perspective: 1000px; cursor: pointer; }
        .deck-card { position: absolute; width: 100%; height: 100%; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid white; object-fit: cover; }
        .deck-container:hover .deck-card { transform: translateZ(20px) rotateY(0deg) scale(1.1); opacity: 1; }
        .deck-card:nth-child(1) { transform: rotate(-5deg) translate(-5px, 0); z-index: 1; }
        .deck-card:nth-child(2) { transform: rotate(-2deg) translate(-2px, 2px); z-index: 2; }
        .deck-card:nth-child(3) { transform: rotate(0deg) translate(0, 4px); z-index: 3; }
        .deck-card:nth-child(4) { transform: rotate(2deg) translate(2px, 2px); z-index: 4; }
        .deck-card:nth-child(5) { transform: rotate(5deg) translate(5px, 0); z-index: 5; }
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-indigo-glow">

    <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-extrabold tracking-tighter text-indigo-600">Y.O</div>
        <div class="hidden md:flex gap-8 font-medium text-sm uppercase tracking-widest text-slate-600">
            <a href="/" class="hover:text-indigo-600 transition-colors">Home</a>
            <a href="/about" class="hover:text-indigo-600 transition-colors">About</a>
            <a href="/certificates" class="hover:text-indigo-600 transition-colors">Certificates</a>
            <a href="/mechanical" class="hover:text-indigo-600 transition-colors">Mechanical</a>
            <a href="/blog" class="hover:text-indigo-600 transition-colors">Blog</a>
            <a href="#contact" class="hover:text-indigo-600 transition-colors">Contact</a>
        </div>
        <div class="md:hidden text-indigo-600"><i class="fas fa-bars text-2xl"></i></div>
    </nav>

    {{ block "main" . }}{{ end }}

    <footer class="py-12 text-center text-slate-400 text-xs tracking-widest uppercase">
        Ylli Osmani &bull; {{ now.Format "2006" }} &bull; Engineered for Efficiency
    </footer>

    <div id="lightbox" onclick="this.style.display='none'">
        <div class="absolute top-10 right-10 text-white text-3xl cursor-pointer">&times;</div>
        <img id="lightbox-img" src="" alt="Full View">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
